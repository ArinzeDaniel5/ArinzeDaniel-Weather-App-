<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ArinzeDaniel's Weather App</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="weather-container">
        <h3> ArinzeDaniel's Weather App</h3>
        <input type="text"id="cityInput"placeholder="Enter city name">
        <button id="searchBtn">Search</button>
        <div class="weather-result">
            <h2 id="cityName"></h2>
            <p id="temperature"></p>
            <p id="description"></p>
            <p id="humidity"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
